{% extends "base.html" %} {% block title %}Profile | BeTwin-AI{% endblock %} {%
block content %}
<div class="min-h-screen flex items-center justify-center text-white">
  <div class="bg-slate-900 p-8 rounded-xl border border-purple-700 w-96">
    <h2 class="text-2xl font-bold mb-4">User Profile</h2>

    <p><b>Name:</b> {{ user.fullname }}</p>
    <p><b>Email:</b> {{ user.email }}</p>
    <p><b>Company:</b> {{ user.company }}</p>

    <a href="/dashboard" class="block mt-6 text-purple-400"
      >Back to Dashboard</a
    >
    <a href="/logout" class="block mt-2 text-red-400">Logout</a>
  </div>
</div>
{% endblock %}
