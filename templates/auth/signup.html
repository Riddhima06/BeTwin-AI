{% extends "base.html" %} {% block title %}Sign Up | BeTwin-AI{% endblock %} {%
block content %}
<section
  class="relative min-h-screen flex items-center justify-center overflow-hidden bg-gradient-to-br from-slate-950 via-purple-950 to-slate-950"
>
  <!-- Background glows -->
  <div
    class="absolute -top-40 -left-40 w-[600px] h-[600px] bg-purple-900/20 rounded-full blur-3xl pointer-events-none"
  ></div>
  <div
    class="absolute -bottom-40 -right-40 w-[500px] h-[500px] bg-pink-900/15 rounded-full blur-3xl pointer-events-none"
  ></div>

  <div class="relative z-10 w-full px-6 py-12">
    <div class="max-w-md mx-auto">
      <!-- Header -->
      <div class="text-center mb-12">
        <h1 class="orbitron font-black text-4xl text-white">Join BeTwin-AI</h1>
        <p class="text-gray-400 text-sm mt-2">Create your account</p>
      </div>

      <!-- Form -->
      <div
        class="bg-slate-950/60 border border-purple-700/30 rounded-2xl p-8 backdrop-blur-xl"
      >
        <!-- ERROR MESSAGE PLACEHOLDER -->
        {% if error %}
        <div class="mb-4 text-red-400 text-sm">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/signup" class="space-y-5">
          <!-- Full Name -->
          <input
            type="text"
            name="fullname"
            required
            placeholder="Full Name"
            class="w-full px-4 py-2 rounded bg-slate-900 text-white border border-purple-700"
          />

          <!-- Email -->
          <input
            type="email"
            name="email"
            required
            placeholder="Email"
            class="w-full px-4 py-2 rounded bg-slate-900 text-white border border-purple-700"
          />

          <!-- Company -->
          <input
            type="text"
            name="company"
            placeholder="Company"
            class="w-full px-4 py-2 rounded bg-slate-900 text-white border border-purple-700"
          />

          <!-- Password -->
          <input
            type="password"
            name="password"
            id="password"
            required
            placeholder="Password"
            class="w-full px-4 py-2 rounded bg-slate-900 text-white border border-purple-700"
          />

          <!-- Confirm Password -->
          <input
            type="password"
            name="confirm_password"
            id="confirm_password"
            required
            placeholder="Confirm Password"
            class="w-full px-4 py-2 rounded bg-slate-900 text-white border border-purple-700"
          />

          <!-- Submit -->
          <button
            type="submit"
            class="w-full bg-purple-600 hover:bg-purple-500 text-white py-2 rounded font-bold"
          >
            Create Account
          </button>
        </form>

        <p class="text-center text-sm text-gray-400 mt-4">
          Already have an account?
          <a href="/login" class="text-purple-400">Login</a>
        </p>
      </div>
    </div>
  </div>
</section>

<!-- Password match check -->
<script>
  const p1 = document.getElementById("password");
  const p2 = document.getElementById("confirm_password");

  p2.addEventListener("input", () => {
    if (p1.value !== p2.value) {
      p2.style.borderColor = "red";
    } else {
      p2.style.borderColor = "green";
    }
  });
</script>

{% endblock %}
