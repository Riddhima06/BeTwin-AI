{% extends "base.html" %} {% block title %}Login | BeTwin-AI{% endblock %} {%
block content %}
<section
  class="relative min-h-screen flex items-center justify-center overflow-hidden bg-gradient-to-br from-slate-950 via-purple-950 to-slate-950"
>
  <!-- Background glows -->
  <div
    class="absolute -top-40 -left-40 w-[600px] h-[600px] bg-purple-900/20 rounded-full blur-3xl pointer-events-none"
  ></div>
  <div
    class="absolute -bottom-40 -right-40 w-[500px] h-[500px] bg-pink-900/15 rounded-full blur-3xl pointer-events-none"
  ></div>

  <div class="relative z-10 w-full px-6">
    <div class="max-w-md mx-auto">
      <!-- Header -->
      <div class="text-center mb-12">
        <h1 class="orbitron font-black text-4xl text-white">Welcome Back</h1>
        <p class="text-gray-400 text-sm mt-2">Login to BeTwin-AI Dashboard</p>
      </div>

      <!-- Login Card -->
      <div
        class="bg-slate-950/60 border border-purple-700/30 rounded-2xl p-8 backdrop-blur-xl"
      >
        <!-- ERROR MESSAGE -->
        {% if error %}
        <div class="mb-4 text-red-400 text-sm">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login" class="space-y-5">
          <!-- Email -->
          <div>
            <label class="text-purple-300 text-xs uppercase tracking-widest"
              >Email</label
            >
            <input
              type="email"
              name="email"
              required
              placeholder="Enter your email"
              class="w-full mt-2 px-4 py-3 rounded bg-slate-900 text-white border border-purple-700 focus:border-purple-500 outline-none"
            />
          </div>

          <!-- Password -->
          <div>
            <label class="text-purple-300 text-xs uppercase tracking-widest"
              >Password</label
            >
            <input
              type="password"
              name="password"
              required
              placeholder="Enter your password"
              class="w-full mt-2 px-4 py-3 rounded bg-slate-900 text-white border border-purple-700 focus:border-purple-500 outline-none"
            />
          </div>

          <!-- Remember -->
          <div class="flex items-center justify-between text-sm">
            <label class="flex items-center gap-2 text-gray-400">
              <input
                type="checkbox"
                name="remember"
                class="accent-purple-600"
              />
              Remember me
            </label>

            <a href="#" class="text-purple-400 hover:text-purple-300">
              Forgot password?
            </a>
          </div>

          <!-- Submit -->
          <button
            type="submit"
            class="w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white py-3 rounded font-bold hover:scale-105 transition"
          >
            Login
          </button>
        </form>

        <!-- Divider -->
        <div class="my-6 text-center text-gray-500 text-sm">OR</div>

        <!-- Signup Link -->
        <p class="text-center text-gray-400 text-sm">
          Don’t have an account?
          <a href="/signup" class="text-purple-400 font-bold">Sign up</a>
        </p>
      </div>
    </div>
  </div>
</section>
{% endblock %}
